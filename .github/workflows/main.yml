name: Run R Simulation

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  simulation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install required packages
        run: |
          Rscript -e 'install.packages(
            c("tidyverse", "survival", "AICcmodavg"),
            repos = "https://cloud.r-project.org",
            dependencies = TRUE
          )'

      - name: Check installed packages
        run: |
          Rscript -e 'library(tidyverse)'
          Rscript -e 'library(survival)'
          Rscript -e 'library(AICcmodavg)'

      - name: Run simulation
        run: Rscript AICc-simulation.R

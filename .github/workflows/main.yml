name: Run R Simulation

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  simulation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install required packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::tidyverse
            any::survival
            any::AICcmodavg

      - name: Check required packages
        run: |
          Rscript -e 'stopifnot(requireNamespace("tidyverse", quietly = TRUE))'
          Rscript -e 'stopifnot(requireNamespace("survival", quietly = TRUE))'
          Rscript -e 'stopifnot(requireNamespace("AICcmodavg", quietly = TRUE))'

      - name: Run simulation
        run: Rscript AICc-simulation.R
